<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon"  href="logosemescrita.png">

  <title>DaltonSpectra</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      overflow:hidden;
      font-family:'Poppins',sans-serif;
    }

    /* =========================
       HEADER
    ========================== */

    .navbar-custom{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:999;
      padding:18px 50px;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .navbar-container{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .logo-area{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo-area img{
      width:52px;
      filter:drop-shadow(0 0 12px rgba(255,255,255,.15));
    }

    .logo-text{
      color:white;
      font-size:2rem;
      font-weight:500;
      margin:0;
    }

    .nav-center{
      display:flex;
      align-items:center;
      gap:50px;
    }

    .nav-center a{
      color:white;
      text-decoration:none;
      font-size:1.1rem;
      font-weight:400;
      transition:.3s;
    }

    .nav-center a:hover{
      color:#67b8ff;
    }

    .nav-right{
      display:flex;
      align-items:center;
      gap:28px;
    }

    .social-icons{
      display:flex;
      align-items:center;
      gap:22px;
    }

    .social-icons i{
      color:white;
      font-size:1.5rem;
      transition:.3s;
      cursor:pointer;
    }

    .social-icons i:hover{
      color:#67b8ff;
      transform:translateY(-2px);
    }

    .test-btn{
      border:none;
      padding:15px 34px;
      border-radius:999px;

      background:linear-gradient(
      135deg,
      #1a73ff,
      #0057d8);

      color:white;
      font-weight:500;
      font-size:1rem;

      transition:.3s;
    }

    .test-btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 25px rgba(0,102,255,.4);
    }
    @media(max-width:768px){

  /* HEADER */

  .navbar-custom{
    padding:16px 18px;
  }

  .nav-center{
    display:none;
  }

  .social-icons{
    display:none;
  }

  .logo-area{
    gap:10px;
  }

  .logo-area img{
    width:42px;
  }

  .logo-text{
    font-size:1.3rem;
  }

  .test-btn{
    padding:10px 18px;
    font-size:.85rem;
  }

  /* HERO */

  .hero-content{
    width:100%;
    padding:0 20px;
    margin-top:40px;
  }

  .logo{
    width:170px;
  }

  .center-glow{
    width:320px;
    height:320px;
  }

  .text-slider{
    height:90px;
    margin-top:30px;
  }

  .hero-text{

    font-size:1.45rem;

    width:100%;

    white-space:normal;

    line-height:1.3;

    padding:0 10px;

    text-align:center;

  }

  .hero-btn{

    margin-top:20px;

    padding:14px 26px;

    font-size:.95rem;

    width:100%;

    max-width:320px;

  }

}

    /* =========================
       HERO
    ========================== */

    .hero{
      position:relative;
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;

      background:
      radial-gradient(circle at center,
      #101828 0%,
      #050505 55%,
      #000 100%);
    }

    /* PARTÍCULAS */

    .particles{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .particle{
      position:absolute;
      border-radius:50%;
      animation:float linear infinite;
      opacity:.8;
      filter:blur(1px);
    }

    /* GLOW */

    .center-glow{
      position:absolute;
      width:550px;
      height:550px;
      border-radius:50%;
      background:rgba(0, 200, 255, 0.08);
      filter:blur(100px);
      animation:pulseGlow 6s ease-in-out infinite;
    }

    /* CONTEÚDO */

    .hero-content{
      position:relative;
      z-index:10;
      text-align:center;
      margin-top:80px;
    }

    /* LOGO */

    .logo-wrapper{
      position:relative;
      animation:logoPulse 5s ease-in-out infinite;
    }

    .logo-glow{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:rgba(255,255,255,0.12);
      filter:blur(50px);
      transform:scale(1.25);
    }

    .logo{
      width:240px;
      position:relative;
      z-index:2;
      filter:drop-shadow(0 0 40px rgba(255,255,255,.25));
    }

    /* TEXTOS */

    .text-slider{
      position:relative;
      width:100%;
      height:120px;
      margin-top:45px;
    }

   .hero-text{


    position:absolute;

    top:0;
    left:50%;

    transform:translateX(-50%);

    width:max-content;

    text-align:center;

    color:white;

    font-size:3rem;

    font-weight:600;

    letter-spacing:.5px;

    opacity:0;

    white-space:nowrap;

}

    .text1{
    animation:textCycle1 24s infinite;
    }

    .text2{
    animation:textCycle2 24s infinite;
    }

    .text3{
    animation:textCycle3 24s infinite;
    }
    /* BOTÃO HERO */

    .hero-btn{

      margin-top:30px;

      border:none;
      outline:none;

      padding:18px 42px;

      border-radius:999px;

      background:linear-gradient(
      135deg,
      #1a73ff,
      #0057d8);

      color:white;

      font-size:1.1rem;
      font-weight:500;

      transition:.35s;

      opacity:1;

      display:inline-block;

      box-shadow:
      0 0 25px rgba(0,102,255,.35);

    }

    .hero-btn:hover{

      transform:translateY(-3px) scale(1.04);

      box-shadow:
      0 0 35px rgba(0,102,255,.55);

    }

    /* =========================
       ANIMAÇÕES
    ========================== */

    @keyframes float{

      0%{
        transform:translate(0,0) scale(1);
        opacity:.2;
      }

      25%{
        opacity:1;
      }

      50%{
        transform:translate(25px,-40px) scale(1.2);
      }

      75%{
        opacity:.6;
      }

      100%{
        transform:translate(0,0) scale(1);
        opacity:.2;
      }
    }

    @keyframes logoPulse{

      0%{
        transform:scale(.95);
        filter:brightness(.9);
      }

      25%{
        transform:scale(1.03);
        filter:brightness(1.1);
      }

      50%{
        transform:scale(1);
        filter:brightness(1.2);
      }

      75%{
        transform:scale(1.05);
        filter:brightness(1.05);
      }

      100%{
        transform:scale(.95);
        filter:brightness(.9);
      }
    }

    @keyframes textCycle1{

      0%{
        opacity:0;
        transform:translateX(-50%) translateY(20px);
      }

      8%{
        opacity:1;
        transform:translateX(-50%) translateY(0);
      }

      28%{
        opacity:1;
        transform:translateX(-50%) translateY(0);
      }

      36%{
        opacity:0;
        transform:translateX(-50%) translateY(-20px);
      }

      100%{
        opacity:0;
      }

    }

    @keyframes textCycle2{

      0%, 33%{
        opacity:0;
        transform:translateX(-50%) translateY(20px);
      }

      41%{
        opacity:1;
        transform:translateX(-50%) translateY(0);
      }

      61%{
        opacity:1;
        transform:translateX(-50%) translateY(0);
      }

      69%{
        opacity:0;
        transform:translateX(-50%) translateY(-20px);
      }

      100%{
        opacity:0;
      }

    }

    @keyframes textCycle1{

  0%{
    opacity:0;
    transform:translateX(-50%) translateY(20px);
  }

  5%{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  20%{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  25%{
    opacity:0;
    transform:translateX(-50%) translateY(-20px);
  }

  100%{
    opacity:0;
  }

}

@keyframes textCycle2{

  0%, 33%{
    opacity:0;
    transform:translateX(-50%) translateY(20px);
  }

  38%{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  53%{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  58%{
    opacity:0;
    transform:translateX(-50%) translateY(-20px);
  }

  100%{
    opacity:0;
  }

}

@keyframes textCycle3{

  0%, 66%{
    opacity:0;
    transform:translateX(-50%) translateY(20px);
  }

  71%{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  86%{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  91%{
    opacity:0;
    transform:translateX(-50%) translateY(-20px);
  }

  100%{
    opacity:0;
  }

}

  </style>
</head>

<body>

  <!-- HEADER -->

  <header class="navbar-custom">

    <div class="navbar-container">

      <!-- ESQUERDA -->
      <div class="logo-area">

        <img src="logosemescrita.png">

        <h1 class="logo-text">
          DaltonSpectra
        </h1>

      </div>

      <!-- CENTRO -->
      <nav class="nav-center">

        <a href="#">
          O que o DaltonSpectra pode fazer
        </a>

        <a href="#">
          Recursos
        </a>

        <a href="#">
          Quem somos
        </a>

      </nav>

      <!-- DIREITA -->
      <div class="nav-right">

        <div class="social-icons">

          <i class="fa-brands fa-instagram"></i>
          <i class="fa-brands fa-tiktok"></i>
          <i class="fa-brands fa-discord"></i>
          <i class="fa-brands fa-x-twitter"></i>

        </div>

        <button class="test-btn" onclick="window.location.href='app.html'">Teste Agora</button>

      </div>

    </div>

  </header>

  <!-- HERO -->

  <section class="hero">

    <!-- Partículas -->
    <div class="particles" id="particles"></div>

    <!-- Glow -->
    <div class="center-glow"></div>

    <!-- Conteúdo -->
    <div class="hero-content">

      <div class="logo-wrapper">

        <div class="logo-glow"></div>

        <img src="logosemescrita.png" class="logo">

      </div>

      <!-- TEXTOS ANIMADOS -->

      <div class="text-slider">

        <h1 class="hero-text text1">
          Identificação de cores para todos
        </h1>

        <h1 class="hero-text text2">
          Inclusão através das cores
        </h1>

        <h1 class="hero-text text3">
          Entenda as cores ao seu redor
        </h1>

      </div>

      <!-- BOTÃO -->

      <button class="hero-btn" onclick="window.location.href='app.html'">Teste o DaltonSpectra agora</button>

    </div>

  </section>

  <script>

    const container = document.getElementById("particles");

    const colors = [
      "#ff5f57",
      "#ffbd2e",
      "#28c840",
      "#00c2ff",
      "#7f5af0",
      "#ff4ecd"
    ];

    for(let i = 0; i < 140; i++){

      const particle = document.createElement("span");

      particle.classList.add("particle");

      const size = Math.random() * 6 + 2;

      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;

      particle.style.left = `${Math.random() * 100}%`;
      particle.style.top = `${Math.random() * 100}%`;

      particle.style.background =
      colors[Math.floor(Math.random() * colors.length)];

      particle.style.boxShadow =
      `0 0 ${size * 3}px ${particle.style.background}`;

      particle.style.animationDuration =
      `${Math.random() * 10 + 8}s`;

      particle.style.animationDelay =
      `${Math.random() * 5}s`;

      container.appendChild(particle);

    }

  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
